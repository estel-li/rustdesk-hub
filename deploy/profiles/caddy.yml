# profiles/caddy.yml — 在 80/443 端口套一层 Caddy,自动 HTTPS 给 rustdesk-api。
# 用法:
#   docker compose -f docker-compose.yml -f profiles/caddy.yml up -d
# 前置:
#   1) .env 里 SERVER_HOST 必须是公网可解析的域名(不是 127.0.0.1)
#   2) DNS A 记录已指向本机
#   3) profiles/caddy/Caddyfile 已按 SERVER_HOST 调整

services:
  caddy:
    image: caddy:2-alpine
    container_name: rustdesk-caddy
    restart: unless-stopped
    networks: [rustdesk-net]
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./profiles/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./profiles/caddy/data:/data
      - ./profiles/caddy/config:/config
    environment:
      - SERVER_HOST=${SERVER_HOST}
      - API_PORT=${API_PORT:-21114}
    depends_on:
      - rustdesk-api

  rustdesk-api:
    # caddy 已经把 21114 反代到 443,host 不再需要 21114 端口
    ports: !reset []
